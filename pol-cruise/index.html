<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>POL Cruise Tools</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="../shared-store.js?v=20260523-shared-store-1"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script defer src="./app.js?v=20260523-ship-count-only"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="suite-header">
        <div>
          <p class="eyebrow">Port Otago cruise tools</p>
          <h1>Ship Count Calendar</h1>
        </div>
      </header>

      <section id="calendarPanel" class="tab-panel active" role="tabpanel" aria-labelledby="calendarTitle">
        <div class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Cruise cargo only</p>
            <h2 id="calendarTitle">Ship Count Calendar</h2>
          </div>
          <div class="actions">
            <button id="exportCsvBtn" type="button" class="secondary-btn">Export CSV</button>
            <button id="clearBtn" type="button" class="ghost-btn">Clear</button>
          </div>
        </header>

        <section class="import-panel" aria-label="Upload schedule documents">
          <label id="dropZone" class="drop-zone" for="fileInput">
            <input id="fileInput" type="file" accept=".jpg,.jpeg,.png,.pdf" multiple />
            <span class="upload-icon" aria-hidden="true">+</span>
            <span class="upload-title">Upload documents in PDF or JPG file</span>
            <span class="upload-copy">The app reads the schedule, keeps rows marked CRUISE, and builds the daily ship count.</span>
          </label>

          <div class="manual-import">
            <label for="rawText">Paste extracted text</label>
            <textarea id="rawText" rows="6" spellcheck="false" placeholder="Example: CRUISE 06:00 Wed 21 Oct 2026 Celebrity Edge Arrival"></textarea>
            <button id="parseTextBtn" type="button" class="primary-btn">Parse Text</button>
          </div>
        </section>

        <section class="status-panel" aria-live="polite">
          <div>
            <span id="statusText">Ready for upload.</span>
            <span id="recordCount" class="muted">0 cruise rows found</span>
          </div>
          <progress id="ocrProgress" max="100" value="0"></progress>
        </section>

        <nav id="seasonTabs" class="season-tabs" aria-label="Season tabs"></nav>

        <section class="summary-strip" aria-label="Season summary">
          <div>
            <span class="summary-value" id="seasonTotal">0</span>
            <span class="summary-label">total ship-days</span>
          </div>
          <div>
            <span class="summary-value" id="busiestDay">-</span>
            <span class="summary-label">busiest day</span>
          </div>
          <div>
            <span class="summary-value" id="daysWithShips">0</span>
            <span class="summary-label">days with ships</span>
          </div>
        </section>

        <section class="table-wrap" aria-label="Cruise calendar table">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Date</th>
                <th>Vessel Name & Movement</th>
                <th>No. of Cruise Vessels</th>
              </tr>
            </thead>
            <tbody id="calendarBody"></tbody>
          </table>
        </section>
        </div>
      </section>
    </main>
  </body>
</html>
